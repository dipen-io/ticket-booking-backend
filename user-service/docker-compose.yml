name: irct-backend

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres_irct
    restart: always
    env_file:
      - ../.secrets/postgres.env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis
    container_name: redis_irct
    restart: always
    command: >
      sh -c 'redis-server --requirepass "${REDIS_PASSWORD}"'
    env_file:
      - ../.secrets/redis.env
    ports:
      - "6379:6379"
      - "8001:8001"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
